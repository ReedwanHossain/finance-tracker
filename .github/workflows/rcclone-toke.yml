name: Upload README to Google Drive

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_TOKEN: ${{ secrets.RCLONE_GDRIVE_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          token = $RCLONE_TOKEN
          root_folder_id = $GDRIVE_FOLDER_ID
          EOF
          
          rclone copy README.md gdrive: -v
