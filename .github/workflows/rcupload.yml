name: rcupload

on:
 workflow_dispatch: 
 push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate with Google
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}'
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/drive

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          service_account_credentials = ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          root_folder_id = ${{ secrets.GDRIVE_FOLDER_ID }}
          EOF
      
            - name: Upload README.md
              run: rclone copy README.md gdrive:
